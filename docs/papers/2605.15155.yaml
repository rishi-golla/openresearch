# SDAR — Self-Distilled Agentic Reinforcement Learning (arXiv 2605.15155)
# Paper: https://arxiv.org/abs/2605.15155
# Code:  https://github.com/ZJU-REAL/SDAR

algorithm_invariants:
  gate_formula: "g_t = sigmoid(beta * Delta_t) where Delta_t = log pi_student(y_t|x_t) - log pi_teacher(y_t|x_t, c_priv)"
  stop_gradient_on_gate: true
  loss: "L = L_GRPO + lambda * L_OPSD"
  lambda: 0.1
  beta: 10
  divergence: "reverse KL (mode-seeking)"
  gating_strategy: "gap (Teacher-Student gap on student-sampled token)"

hyperparameters:
  learning_rate: 1.0e-6
  group_size_G: 8
  epochs_per_batch: 1
  prompt_length: "2048 (ALFWorld), 4096 (Search-QA, WebShop)"
  eps_clip: 0.2
  seeds: [42, 43, 44]

models_in_paper:
  # Qwen3 post-trained models have NO "-Instruct" suffix on HuggingFace
  # (Qwen/Qwen3-1.7B exists; Qwen/Qwen3-1.7B-Instruct 401s — does not exist).
  # This value is the canonical path the pre-flight guard enforces verbatim, so a
  # wrong id makes every run pass preflight then 401 at runtime (hollow success).
  qwen3_1_7b: Qwen/Qwen3-1.7B
  qwen2_5_3b: Qwen/Qwen2.5-3B-Instruct
  qwen2_5_7b: Qwen/Qwen2.5-7B-Instruct

datasets:
  alfworld:
    setup: "pip install alfworld && alfworld-download"
    paper_split: "GiGPO train split"
    categories: [Pick, Look, Clean, Heat, Cool, Pick2]
  search_qa:
    datasets: [NQ, HotpotQA, TriviaQA, PopQA, 2Wiki, MuSiQue, Bamboogle]
    setup: "datasets.load_dataset('hotpot_qa', 'distractor') etc.; uses E5 retriever from Search-R1"
  webshop:
    setup: "pip install webshop-text-env (or upstream package); 128 validation tasks"

eval_metrics:
  alfworld: "success rate (%)"
  search_qa: "exact-match accuracy (%)"
  webshop: "score (0-100) and accuracy (%)"

baselines:
  - GRPO
  - OPSD
  - Skill-SD
  - GRPO+OPSD
  - RLSD

code_release: https://github.com/ZJU-REAL/SDAR

paper_targets:
  # Approximate numbers from SDAR Table 1 and Figures 3-5. The rubric grader
  # scores 'Result match' by comparing within ~10% relative on these.
  # Targets are the average across the three Qwen sizes the paper sweeps.
  alfworld_grpo_success_rate: 70.0          # Table 1 — GRPO ALFWorld success rate
  alfworld_sdar_success_rate: 82.0          # Table 1 — SDAR ALFWorld success rate (headline lift)
  searchqa_grpo_em: 38.0                    # Figure 4 — Search-QA exact-match
  searchqa_sdar_em: 46.0                    # Figure 4 — SDAR Search-QA exact-match
  webshop_grpo_score: 60.0                  # Figure 5 — WebShop score
  webshop_sdar_score: 70.0                  # Figure 5 — SDAR WebShop score

  required_metrics_keys:
    - alfworld_success_rate_per_model        # {qwen3_1_7b: …, qwen2_5_3b: …, qwen2_5_7b: …}
    - searchqa_em_per_model
    - webshop_score_per_model
    - per_model                              # canonical multi-scale shape
    - baselines_vs_sdar                      # delta table per env
    - omitted                                # honest-omits for skipped envs / model sizes

  # Variants the paper compares; rubric grader checks each appears in
  # per_model OR omitted (with reason).
  variants_required:
    - qwen3_1_7b                            # smallest, must run
    - qwen2_5_3b                            # middle, should run
    - qwen2_5_7b                            # largest, may be honestly omitted on tight budgets
    - grpo                                  # paper baseline
    - opsd                                  # paper baseline
    - skill_sd                              # paper baseline
    - grpo_opsd                             # paper baseline
    - rlsd                                  # paper baseline
    - sdar                                  # paper proposed method

  required_artifacts:
    - metrics.json
    - config_used.json
    - README.md
    - training_curves.json
    - "fig_alfworld_*.png"                  # at least one ALFWorld curve
    - "fig_searchqa_*.png"
    - "fig_webshop_*.png"

scope_hints:
  - "The headline claim is g_t = sigmoid(beta * Delta_t) with beta=10, lambda=0.1, stop-gradient on the gate. The leaf scorer reads code; these constants MUST appear literally."
  - "Run AT LEAST qwen3_1_7b end-to-end; honest-omit qwen2_5_7b if budget is tight (declare in metrics.json['omitted'])."
  - "Every paper baseline (GRPO, OPSD, Skill-SD, GRPO+OPSD, RLSD) AND the proposed SDAR must appear as a key in per_model — declared omitted with a reason is acceptable, silently skipped is not."
  - "Emit per-step training curves (per (model, env) pair) so the convergence-improvement claim can be graded."
