# ---------------------------------------------------------------------------
# cpu-stub-job.yaml — CPU-only Workload Identity + Blob write smoke test
#
# PURPOSE:
#   Validate in one Job that:
#     1. Workload Identity token is injected (azure.workload.identity/use: "true").
#     2. DefaultAzureCredential can acquire a Blob token and write a canned
#        metrics.json marker under smoke/cpu-stub/metrics.json.
#     3. The Azure Files PVC mounts at /mnt/reprolab-cache with read-write access.
#     4. The orchestrator's k8s_job_cell_runner job-watch loop can detect Job
#        success and pull artifacts from Blob.
#     5. ResourceQuota allows the Job (GPU quota NOT consumed).
#
# WHAT IT DOES NOT PROVE:
#   - GPU scheduling (use hello-gpu-job.yaml for that once quota is granted).
#   - CUDA execution or nvidia-smi availability.
#
# USAGE:
#   # Fill STORAGE_ACCOUNT and BLOB_CONTAINER env vars below, then:
#   kubectl apply -f smoke/cpu-stub-job.yaml -n reprolab
#   kubectl get jobs -n reprolab -w
#   kubectl logs -n reprolab job/cpu-stub-smoke -f
#
# VERIFICATION:
#   Job status = Completed; logs contain "Blob write OK" and "Files PVC OK".
#   Confirm the marker blob exists:
#     az storage blob show \
#       --account-name <STORAGE_ACCOUNT> \
#       --container-name <BLOB_CONTAINER> \
#       --name smoke/cpu-stub/metrics.json \
#       --auth-mode login
#
# FILL BEFORE RUNNING — substitute from Bicep stack outputs:
#   STORAGE_ACCOUNT  = az deployment group show -g <rg> -n openresearch-infra \
#                        --query properties.outputs.storageAccountNameOut.value -o tsv
#   BLOB_CONTAINER   = az deployment group show -g <rg> -n openresearch-infra \
#                        --query properties.outputs.blobContainerNameOut.value -o tsv
#   (MI_CLIENT_ID is injected automatically by the workload-identity webhook via
#    the annotated ServiceAccount — no explicit env var is needed.)
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: cpu-stub-smoke
  # Replace with your namespace (.Values.namespace)
  namespace: reprolab
  labels:
    app.kubernetes.io/name: reprolab-aks-smoke
    app.kubernetes.io/component: cpu-stub
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: cpu-stub-smoke
        # MANDATORY workload identity label.  The webhook will NOT inject the
        # projected OIDC token volume unless this label is present on the pod.
        azure.workload.identity/use: "true"
    spec:
      # Use the Workload-Identity-annotated ServiceAccount (reprolab-sa).
      # Matches .Values.serviceAccountName and the Bicep federated-credential subject:
      #   system:serviceaccount:reprolab:reprolab-sa
      serviceAccountName: reprolab-sa
      restartPolicy: Never

      # NO nodeSelector — let the scheduler place this on the system (CPU) pool.
      # NO GPU taint toleration — confirms CPU-only node scheduling works.

      containers:
        - name: cpu-stub
          # python:3.12-slim is sufficient; azure-identity + azure-storage-blob are
          # pip-installed at startup if not already present (fallback path below).
          # For faster execution: replace with the ACR cell-base image which has them
          # pre-installed: sciartacr.azurecr.io/aks-cell-base:<sha>
          image: "python:3.12-slim"
          imagePullPolicy: IfNotPresent

          # CPU-only — no nvidia.com/gpu resource.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            # FILL: storage account name (Bicep output storageAccountNameOut)
            - name: REPROLAB_STORAGE_ACCOUNT
              value: "REPLACE_WITH_STORAGE_ACCOUNT"
            # FILL: blob container name (Bicep output blobContainerNameOut)
            - name: REPROLAB_BLOB_CONTAINER
              value: "REPLACE_WITH_BLOB_CONTAINER"
            # Fixed target blob — this is the canonical smoke artifact path.
            - name: SMOKE_BLOB_NAME
              value: "smoke/cpu-stub/metrics.json"

          volumeMounts:
            - name: reprolab-cache
              mountPath: /mnt/reprolab-cache

          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              echo "=== cpu-stub-smoke starting ==="

              # 1. Verify Azure Files PVC is mounted with read-write access.
              echo "--- Files PVC write test ---"
              TMPFILE="/mnt/reprolab-cache/cpu-stub-test-$$.txt"
              echo "cpu-stub hello at $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "${TMPFILE}"
              cat "${TMPFILE}"
              rm "${TMPFILE}"
              echo "Files PVC OK"

              # 2. Write a canned metrics.json to Blob using Workload Identity.
              # The DefaultAzureCredential chain picks up the projected OIDC token
              # injected by the Workload Identity webhook — no static secret needed.
              echo "--- Blob write via Workload Identity ---"
              python3 - <<'PYEOF'
              import os, sys, json, datetime

              account    = os.environ["REPROLAB_STORAGE_ACCOUNT"]
              container  = os.environ["REPROLAB_BLOB_CONTAINER"]
              blob_name  = os.environ["SMOKE_BLOB_NAME"]

              try:
                  from azure.identity import DefaultAzureCredential
                  from azure.storage.blob import BlobServiceClient
              except ImportError:
                  # Fallback: install on the fly when using python:3.12-slim.
                  import subprocess
                  subprocess.check_call([
                      sys.executable, "-m", "pip", "install", "-q",
                      "azure-identity>=1.17,<2",
                      "azure-storage-blob>=12.20,<13",
                  ])
                  from azure.identity import DefaultAzureCredential
                  from azure.storage.blob import BlobServiceClient

              cred   = DefaultAzureCredential()
              url    = f"https://{account}.blob.core.windows.net"
              client = BlobServiceClient(account_url=url, credential=cred)
              cc     = client.get_container_client(container)

              # Write a canned metrics.json — same shape as a real cell output.
              # A downstream k8s_job_cell_runner that watches this Job can parse
              # this blob to prove end-to-end artifact bus fidelity.
              metrics = {
                  "smoke": True,
                  "source": "cpu-stub-smoke",
                  "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
                  "accuracy": 1.0,
                  "note": "Canned smoke marker — not a real training result.",
              }
              payload = json.dumps(metrics, indent=2).encode()
              cc.upload_blob(blob_name, payload, overwrite=True)
              print(f"Uploaded metrics.json to blob://{container}/{blob_name}")
              print("Blob write OK")
              PYEOF

              echo "=== cpu-stub-smoke PASSED ==="

      volumes:
        - name: reprolab-cache
          persistentVolumeClaim:
            claimName: reprolab-cache
