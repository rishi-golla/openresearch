# ---------------------------------------------------------------------------
# cpu-stub-job.yaml — CPU-only validation fallback (quota-blocked path)
#
# PURPOSE:
#   Validate the Blob bus, Azure Files PVC mount, Workload Identity token
#   injection, and Job watch plumbing WITHOUT consuming any
#   nvidia.com/gpu quota.  Use this when the A100 quota request is still
#   pending or when you want fast CI-style feedback.
#
#   This is the "Phase-1a CPU fallback" described in the design doc §11:
#   "if quota is not granted within the engagement window, Phase 1a/1b can
#    be validated on a CPU node + a fake-GPU stub Job to prove the wiring".
#
# WHAT IT PROVES:
#   1. Workload Identity token is injected (azure.workload.identity/use: "true").
#   2. DefaultAzureCredential can acquire a Blob token and write a marker blob.
#   3. The Azure Files PVC mounts at /mnt/reprolab-cache with read-write access.
#   4. The orchestrator's k8s_job_cell_runner job-watch loop can detect
#      Job success and pull artifacts from Blob.
#   5. ResourceQuota allows the Job (GPU quota not consumed).
#
# WHAT IT DOES NOT PROVE:
#   - GPU scheduling (use hello-gpu-job.yaml for that once quota is granted).
#   - CUDA execution or nvidia-smi availability.
#
# USAGE:
#   kubectl apply -f smoke/cpu-stub-job.yaml -n <namespace>
#   kubectl get jobs -n <namespace> -w
#   kubectl logs -n <namespace> job/cpu-stub-smoke -f
#
# SUCCESS CRITERIA:
#   Job status = Completed; logs contain "Blob write OK" and "Files PVC OK".
#   A marker blob appears under smoke/ in your Blob container.
#
# FILL BEFORE RUNNING — substitute from `terraform output`:
#   STORAGE_ACCOUNT = terraform output -raw storage_account_name
#   BLOB_CONTAINER  = terraform output -raw blob_container_name
#   MI_CLIENT_ID    = terraform output -raw workload_identity_client_id
#   IMAGE           = any image that has azure-identity + azure-storage-blob
#                     (the aks-cell-base image works; or use python:3.12-slim
#                     with pip install azure-identity azure-storage-blob)
#   NAMESPACE       = the value of .Values.namespace
#   SERVICE_ACCOUNT = the value of .Values.serviceAccountName
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: cpu-stub-smoke
  # Replace with your namespace (.Values.namespace)
  namespace: reprolab
  labels:
    app.kubernetes.io/name: reprolab-aks-smoke
    app.kubernetes.io/component: cpu-stub
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: cpu-stub-smoke
        # MANDATORY workload identity label.  The webhook will NOT inject the
        # projected OIDC token volume unless this label is present on the pod.
        azure.workload.identity/use: "true"
    spec:
      # Use the Workload-Identity-annotated SA.
      # Value MUST match .Values.serviceAccountName (default: reprolab-sa).
      # Terraform federated-credential subject: system:serviceaccount:<ns>:reprolab-sa
      serviceAccountName: reprolab-sa
      restartPolicy: Never

      # NO nodeSelector — runs on the system (CPU) node pool.
      # NO GPU taint toleration — confirms CPU node scheduling works.

      containers:
        - name: cpu-stub
          # Can use the AKS cell base image (which has Azure SDK installed),
          # or any Python image after pip-installing azure-identity + azure-storage-blob.
          # Replace with the ACR image or a plain python:3.12-slim image.
          image: "REPLACE_WITH_IMAGE"
          imagePullPolicy: IfNotPresent

          # CPU-only — no nvidia.com/gpu resource.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: AZURE_CLIENT_ID
              # [TF: workload_identity_client_id]
              value: "REPLACE_WITH_MI_CLIENT_ID"
            - name: OPENRESEARCH_STORAGE_ACCOUNT
              # [TF: storage_account_name]
              value: "REPLACE_WITH_STORAGE_ACCOUNT"
            - name: OPENRESEARCH_BLOB_CONTAINER
              # [TF: blob_container_name]
              value: "REPLACE_WITH_BLOB_CONTAINER"
            - name: SMOKE_BLOB_NAME
              value: "smoke/cpu-stub-smoke-marker.txt"

          volumeMounts:
            - name: reprolab-cache
              mountPath: /mnt/reprolab-cache

          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              echo "=== cpu-stub-smoke starting ==="

              # 1. Write and read a test file on the Azure Files PVC.
              echo "--- Files PVC write ---"
              TMPFILE="/mnt/reprolab-cache/cpu-stub-test-$(date +%s).txt"
              echo "cpu-stub hello at $(date)" > "${TMPFILE}"
              cat "${TMPFILE}"
              rm "${TMPFILE}"
              echo "Files PVC OK"

              # 2. Write a marker blob using Workload Identity.
              echo "--- Blob write via Workload Identity ---"
              python3 - <<'PYEOF'
              import os, sys, datetime

              account = os.environ["OPENRESEARCH_STORAGE_ACCOUNT"]
              container = os.environ["OPENRESEARCH_BLOB_CONTAINER"]
              blob_name = os.environ["SMOKE_BLOB_NAME"]

              try:
                  from azure.identity import DefaultAzureCredential
                  from azure.storage.blob import BlobServiceClient
              except ImportError:
                  # Fallback: install on the fly if using a minimal image.
                  import subprocess
                  subprocess.check_call([
                      sys.executable, "-m", "pip", "install", "-q",
                      "azure-identity>=1.17,<2",
                      "azure-storage-blob>=12.20,<13",
                  ])
                  from azure.identity import DefaultAzureCredential
                  from azure.storage.blob import BlobServiceClient

              cred = DefaultAzureCredential()
              url = f"https://{account}.blob.core.windows.net"
              client = BlobServiceClient(account_url=url, credential=cred)
              cc = client.get_container_client(container)
              marker = f"cpu-stub-smoke OK at {datetime.datetime.utcnow().isoformat()}"
              cc.upload_blob(blob_name, marker.encode(), overwrite=True)
              print(f"Uploaded marker: blob://{container}/{blob_name}")
              print("Blob write OK")
              PYEOF

              echo "=== cpu-stub-smoke PASSED ==="

      volumes:
        - name: reprolab-cache
          persistentVolumeClaim:
            claimName: reprolab-cache
