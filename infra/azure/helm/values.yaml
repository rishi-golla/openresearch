# ---------------------------------------------------------------------------
# ReproLab AKS L2 Helm values
#
# VALUES ↔ TERRAFORM OUTPUT MAPPING
# Every value marked [TF: <output>] must be sourced from `terraform output`
# after `terraform apply`.  Values marked [tfvar: <var>] come from the
# envs/deepinvent/main.tfvars file, not from Terraform outputs.  Example:
#   helm install reprolab-aks ./infra/azure/helm \
#     --set workloadIdentity.clientId=$(terraform -chdir=infra/azure output -raw workload_identity_client_id) \
#     --set storage.accountName=$(terraform -chdir=infra/azure output -raw storage_account_name) \
#     ...
# See README.md for the full one-liner and the complete mapping table.
# ---------------------------------------------------------------------------

# -- Kubernetes namespace that the chart creates and all resources live in.
# [tfvar: workload_identity_namespace]  (envs/deepinvent/main.tfvars)
namespace: reprolab

# -- Name of the Kubernetes ServiceAccount (must match the federated-credential
#    subject `system:serviceaccount:<namespace>:<serviceAccountName>`).
# [tfvar: workload_identity_service_account]  (envs/deepinvent/main.tfvars)
serviceAccountName: reprolab-sa

# ---------------------------------------------------------------------------
# Workload Identity — MANDATORY; sourced from the `identity` Terraform module.
# ---------------------------------------------------------------------------
workloadIdentity:
  # The client ID of the user-assigned managed identity.
  # [TF: workload_identity_client_id]  (root output → identity module)
  clientId: ""   # REQUIRED — fill from `terraform output -raw workload_identity_client_id`

# ---------------------------------------------------------------------------
# Storage — sourced from the `storage` Terraform module.
# ---------------------------------------------------------------------------
storage:
  # Name of the Azure Storage account that holds the Blob artifact container
  # (runs/<id>/code/**, runs/<id>/cells/**).
  # [TF: storage_account_name]
  accountName: ""   # REQUIRED — fill from `terraform output -raw storage_account_name`

  # Name of the storage account that hosts the Azure Files cache share.
  # When files_premium = false (default): identical to accountName above.
  # When files_premium = true: a dedicated Premium FileStorage account.
  # [TF: files_storage_account_name]
  # Set with: --set storage.filesAccountName=$(terraform output -raw files_storage_account_name)
  # Omit (leave "") to fall back to storage.accountName for the Standard-tier default.
  filesAccountName: ""

  # Name of the Azure Files share to mount as the shared cache PVC.
  # [TF: files_share_name]
  fileShareName: ""   # REQUIRED — fill from `terraform output -raw files_share_name`

  # Size of the PersistentVolumeClaim bound to the Files share.
  # Must be <= the quota set on the Files share in Terraform.
  pvcSize: "200Gi"

  # StorageClass reclaim policy: Retain keeps the underlying share on chart delete.
  reclaimPolicy: Retain

# ---------------------------------------------------------------------------
# GPU node pool — sourced from the `gpu_nodepool` Terraform module.
#
# With the parameterized gpu_skus design, every GPU pool shares:
#   taintKey   = nvidia.com/gpu   (NoSchedule, tolerated by the device plugin)
#   skuLabelKey = reprolab/sku    (the primary Job nodeSelector key)
#
# Job pods target a specific pool via:
#   nodeSelector:
#     reprolab/sku: <defaultSku>    (or the plan's short_name at runtime)
#
# [TF: gpu_pools output]  Use gpu_pools[<short_name>].sku_label for each pool.
# ---------------------------------------------------------------------------
gpu:
  # Taint key applied to ALL GPU-pool nodes (value "present", effect NoSchedule).
  # The NVIDIA device-plugin DaemonSet tolerates this with operator: Exists,
  # so it runs on every GPU pool regardless of SKU.
  # [TF: gpu_taint_key]  constant: "nvidia.com/gpu"
  taintKey: nvidia.com/gpu

  # Label key used to identify the target GPU pool in Job nodeSelectors.
  # Every GPU node pool is labeled reprolab/sku=<catalog short_name>.
  # This is a constant written by the gpu_nodepool Terraform module.
  skuLabelKey: reprolab/sku

  # Default GPU SKU for smoke jobs and as the orchestrator fallback.
  # Must match a short_name in var.gpu_skus (i.e. a provisioned pool).
  # Override in envs/<env>/helm-values.yaml when additional pools are present.
  # [TF: gpu_pools — first entry's sku_label]
  defaultSku: azure_a100_80

  # ── Legacy values — kept for any templates that still reference them ────────
  # These now refer to 'reprolab/sku' (the new primary key).  Remove once all
  # callers have migrated to skuLabelKey / defaultSku.
  nodePoolLabelKey: reprolab/sku
  nodePoolLabelValue: azure_a100_80   # matches defaultSku above

# ---------------------------------------------------------------------------
# RBAC — the orchestrator Entra group that is bound to the Job-management Role.
# ---------------------------------------------------------------------------
rbac:
  # Azure AD / Entra object ID of the operator group that should be able to
  # create/watch/delete Jobs in the namespace.
  # [tfvar: operator_entra_group_object_id]  (envs/deepinvent/main.tfvars — not a TF output)
  operatorGroupObjectId: ""   # REQUIRED — fill from your Entra group OID

# ---------------------------------------------------------------------------
# ACR / image — sourced from the `acr` Terraform module.
# ---------------------------------------------------------------------------
image:
  # ACR login server + base image tag for AKS cell Jobs.
  # [TF: acr_login_server]  (root output → acr module)  e.g. "myacr.azurecr.io/aks-cell-base:0.1.0"
  aksCellBase: ""   # REQUIRED — fill from `terraform output -raw acr_login_server`

# ---------------------------------------------------------------------------
# ResourceQuota limits for the namespace.
# Sizing rules (override in envs/<env>/helm-values.yaml as needed):
#   maxGpu / maxGpuLimits = Σ(pool max_nodes × gpu_count) across all GPU pools.
#     Default single A100-80 pool (max_nodes=4, gpu_count=1) → maxGpu=4.
#     Set to 8 here to match the default gpu_skus[0].max_nodes=4 with headroom
#     for a second pool; adjust if you reduce/increase pool max_nodes.
#   maxJobs >= parallelism × (1 + max_escalations) per resourcequota.yaml comment.
#     64 covers 2 concurrent 8-cell runs × 3 attempts + 1 hr TTL headroom.
# ---------------------------------------------------------------------------
resourceQuota:
  # Hard limit on the total number of nvidia.com/gpu REQUESTED across all pods.
  # Sizing: Σ(pool max_nodes × gpu_count). Default: 8 (headroom for 2 pools).
  # [tfvar: gpu_max_nodes]  — override per-env in envs/<env>/helm-values.yaml.
  maxGpu: 8

  # Hard limit on nvidia.com/gpu LIMITS (typically == maxGpu for GPU workloads).
  maxGpuLimits: 8

  # Hard limit on the number of Jobs that may exist (running + pending) in namespace.
  # Sizing: parallelism × (1 + max_escalations) + TTL-retained finished Jobs.
  # Override in envs/<env>/helm-values.yaml if parallelism or escalations increase.
  maxJobs: 64

# ---------------------------------------------------------------------------
# NVIDIA device plugin DaemonSet.
# ---------------------------------------------------------------------------
devicePlugin:
  # Pinned version tag from https://github.com/NVIDIA/k8s-device-plugin/releases
  version: "v0.16.2"

  # Image repository (override if mirroring to ACR).
  repository: nvcr.io/nvidia/k8s-device-plugin
