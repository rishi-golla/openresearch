apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-aks.labels" . | nindent 4 }}
  annotations:
    # ---------------------------------------------------------------------------
    # WORKLOAD IDENTITY — binds this Kubernetes ServiceAccount to the user-
    # assigned managed identity created by the Terraform `identity` module.
    # The value MUST match the `client_id` output of that module.
    # The Terraform `identity` module creates a federated credential whose
    # subject is:  system:serviceaccount:<namespace>:<serviceAccountName>
    # with audience: api://AzureADTokenExchange
    # ---------------------------------------------------------------------------
    azure.workload.identity/client-id: {{ required "workloadIdentity.clientId is required (federated MI client-id for cell Blob auth)" .Values.workloadIdentity.clientId | quote }}
