{{- if .Values.orchestrator.enabled }}
# ---------------------------------------------------------------------------
# orchestrator-secretproviderclass.yaml
#
# Secrets Store CSI Driver SecretProviderClass — mounts the two API keys from
# Azure Key Vault into the orchestrator Pod and syncs them as a k8s Secret so
# they can be injected as environment variables without any static secret.
#
# Prerequisites (cluster-level, not managed by this chart):
#   • secrets-store-csi-driver DaemonSet installed:
#       helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
#         -n kube-system --set syncSecret.enabled=true
#   • Azure Key Vault provider for the CSI driver installed:
#       helm install azure-csi-provider azure-csi-provider/azure-keyvault-secrets-provider \
#         -n kube-system
#
# Secrets surfaced (mounted from vault at pod start; synced to k8s Secret):
#   azure-openai-api-key  →  env AZURE_OPENAI_API_KEY  (root AOAI model auth)
#   anthropic-api-key     →  env ANTHROPIC_API_KEY      (Sonnet sub-agent auth)
#
# Auth: the orchestrator ServiceAccount's federated credential (Workload Identity)
# is what the CSI provider uses — no clientSecret, no certificate.
#
# Fill .Values.orchestrator.keyVaultName  from Bicep output keyVaultNameOut.
# Fill .Values.orchestrator.identityClientId from Bicep output orchestratorIdentityClientId.
# Fill .Values.orchestrator.tenantId from `az account show --query tenantId -o tsv`.
# ---------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: reprolab-orchestrator-kv
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-aks.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    # Key Vault name (not the full URI — the provider resolves the URI internally).
    keyvaultName: {{ .Values.orchestrator.keyVaultName | quote }}
    # Tenant ID of the Azure AD tenant that owns the Key Vault.
    tenantId: {{ .Values.orchestrator.tenantId | quote }}
    # Orchestrator UAMI client ID — used by the CSI provider to acquire a token
    # via Workload Identity federation (no clientSecret path).
    clientID: {{ .Values.orchestrator.identityClientId | quote }}
    # Secret objects to pull.  Names must exactly match what was set via
    # `az keyvault secret set --name <name>`.
    objects: |
      array:
        - |
          objectName: azure-openai-api-key
          objectType: secret
        - |
          objectName: anthropic-api-key
          objectType: secret
  # Sync pulled secrets into a Kubernetes Secret so they can be referenced as
  # env vars without a volumeMount in every container (both the volumeMount and
  # the secretObjects sync are used — the mount is required to keep the Secret
  # live; the env reference reads from the synced Secret).
  secretObjects:
    - secretName: reprolab-orchestrator-secrets
      type: Opaque
      data:
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
{{- end }}
