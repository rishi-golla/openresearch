{{- if .Values.orchestrator.enabled }}
# ---------------------------------------------------------------------------
# orchestrator-serviceaccount.yaml
#
# Kubernetes ServiceAccount for the in-cluster ReproLab orchestrator
# (Deployment + CronJob).  This is a SEPARATE identity from the training-cell
# ServiceAccount (reprolab-sa) so Key Vault access is auditable independently.
#
# WORKLOAD IDENTITY wiring:
#   1. The Bicep `orchestratorIdentity` module creates a user-assigned MI named
#      "<prefix>-orch-workload-mi" with a federated credential whose subject is:
#        system:serviceaccount:<namespace>:<orchestratorServiceAccount>
#   2. This ServiceAccount carries the annotation pointing at that MI's client ID.
#   3. Pods with label azure.workload.identity/use: "true" and this SA receive
#      a projected OIDC token volume that DefaultAzureCredential exchanges for
#      an AAD token (no static secrets in the cluster).
#
# Fill .Values.orchestrator.identityClientId from Bicep output
# `orchestratorIdentityClientId`:
#   --set orchestrator.identityClientId=$(az deployment group show \
#     -g <rg> -n openresearch-infra \
#     --query properties.outputs.orchestratorIdentityClientId.value -o tsv)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reprolab-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-aks.labels" . | nindent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    # WORKLOAD IDENTITY — must match the client ID of the orchestrator UAMI.
    # Source: Bicep output orchestratorIdentityClientId.
    azure.workload.identity/client-id: {{ .Values.orchestrator.identityClientId | quote }}
{{- end }}
