apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-aks.labels" . | nindent 4 }}
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
      {{- include "reprolab-aks.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
        {{- include "reprolab-aks.selectorLabels" . | nindent 8 }}
      annotations:
        # Ensure the DaemonSet rolls when the chart version changes.
        helm.sh/chart-version: {{ .Chart.Version | quote }}
    spec:
      # ---------------------------------------------------------------------------
      # Run ONLY on GPU nodes in our dedicated pool.  The node selector targets the
      # label applied by the `gpu_nodepool` Terraform module.
      # [TF: gpu_node_pool_label_key / gpu_node_pool_label_value]  (root outputs, module constants)
      # ---------------------------------------------------------------------------
      nodeSelector:
        {{ .Values.gpu.nodePoolLabelKey }}: {{ .Values.gpu.nodePoolLabelValue | quote }}

      tolerations:
        # Tolerate the GPU taint applied to every GPU-pool node.
        # This is the gate that PREVENTS the device plugin from landing on CPU nodes.
        - key: {{ .Values.gpu.taintKey | quote }}
          operator: Exists
          effect: NoSchedule
        # Standard AKS node-not-ready / unreachable tolerations for DaemonSets.
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute

      priorityClassName: system-node-critical

      containers:
        - name: nvidia-device-plugin
          image: {{ .Values.devicePlugin.repository }}:{{ .Values.devicePlugin.version }}
          imagePullPolicy: IfNotPresent
          args:
            # Expose all GPU UUIDs as individual allocatable nvidia.com/gpu resources.
            - --mig-strategy=none
            - --pass-device-specs=false
            - --fail-on-init-error=true
            - --device-list-strategy=envvar
          env:
            - name: PASS_DEVICE_SPECS
              value: "false"
          securityContext:
            # The device plugin must be privileged to access /dev/nvidiaX devices.
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
