apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.namespace }}-azurefiles-wi
  labels:
    {{- include "reprolab-aks.labels" . | nindent 4 }}
# Azure Files CSI driver — bundled with AKS >= 1.21.
provisioner: file.csi.azure.com
# ---------------------------------------------------------------------------
# KEYLESS Azure Files: storeAccountKey=false directs the CSI driver to obtain
# a SAS/OAuth token via the kubelet managed identity (Azure Files SMB MI Admin
# role assigned in Terraform storage module) instead of fetching a static
# storage account key.  NO Kubernetes Secret is created or required.
# ---------------------------------------------------------------------------
parameters:
  # Reference the EXISTING storage account and share provisioned by Terraform.
  # These values are NOT created by this StorageClass; they are pre-existing.
  # storageAccount: [TF: storage_account_name]
  storageAccount: {{ .Values.storage.accountName | quote }}
  # shareName: [TF: files_share_name]
  shareName: {{ .Values.storage.fileShareName | quote }}
  # Keyless auth — the CSI driver uses the kubelet identity, not a key.
  storeAccountKey: "false"
  # Protocol (SMB is the default for Azure Files CSI).
  protocol: smb
# Allow simultaneous read-write mounts from multiple nodes (needed for the
# shared HF_HOME / pip-cache PVC used by multiple parallel Job pods).
volumeBindingMode: Immediate
reclaimPolicy: {{ .Values.storage.reclaimPolicy }}
allowVolumeExpansion: true
mountOptions:
  - dir_mode=0777
  - file_mode=0777
  - uid=0
  - gid=0
  - mfsymlinks
  - cache=strict
  - actimeo=30
  - nosharesock
