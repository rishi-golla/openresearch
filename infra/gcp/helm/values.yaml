# ---------------------------------------------------------------------------
# ReproLab GKE L2 Helm values
#
# VALUES ↔ TERRAFORM OUTPUT MAPPING
# Every value marked [TF: <output>] must be sourced from `terraform output`
# after `terraform apply`.  Values marked [tfvar: <var>] come from the
# envs/deepinvent/main.tfvars file, not from Terraform outputs.  One-liner:
#   helm install reprolab-gke ./infra/gcp/helm \
#     --set workloadIdentity.gcpServiceAccount=$(terraform -chdir=infra/gcp output -raw workload_identity_gcp_service_account) \
#     --set storage.bucket=$(terraform -chdir=infra/gcp output -raw gcs_bucket_name) \
#     --set image.gkeCellBase=$(terraform -chdir=infra/gcp output -raw artifact_registry_url)/gke-cell-base:0.1.0
# See README.md for the full one-liner (with Filestore + RBAC) and mapping table.
# ---------------------------------------------------------------------------

# -- Kubernetes namespace that the chart creates and all resources live in.
# [tfvar: workload_identity_namespace]  (envs/deepinvent/main.tfvars)
namespace: reprolab

# -- Name of the Kubernetes ServiceAccount (must match the Workload Identity
#    member `<project>.svc.id.goog[<namespace>/<serviceAccountName>]`).
# [tfvar: workload_identity_service_account]  (envs/deepinvent/main.tfvars)
serviceAccountName: reprolab-sa

# ---------------------------------------------------------------------------
# Workload Identity — MANDATORY; sourced from the `identity` Terraform module.
# On GKE, binding is via the KSA annotation iam.gke.io/gcp-service-account.
# There is NO `azure.workload.identity/use` pod label on GKE.
# ---------------------------------------------------------------------------
workloadIdentity:
  # Email of the GCP IAM service account the KSA impersonates.
  # [TF: workload_identity_gcp_service_account]
  gcpServiceAccount: ""   # REQUIRED — fill from `terraform output -raw workload_identity_gcp_service_account`

# ---------------------------------------------------------------------------
# Storage — sourced from the `storage` Terraform module.
# ---------------------------------------------------------------------------
storage:
  # Name of the GCS bucket holding the artifact bus
  # (runs/<id>/code/**, runs/<id>/cells/**).
  # [TF: gcs_bucket_name]
  bucket: ""   # REQUIRED — fill from `terraform output -raw gcs_bucket_name`

  # Name of the Filestore file share to mount as the shared RWX cache PVC.
  # Leave "" to SKIP the Filestore StorageClass + PVC entirely (Jobs use an
  # emptyDir / GCS-only cache — matches filestore_enabled = false in Terraform).
  # [TF: filestore_share]
  filestoreShare: ""

  # IP address of the Filestore instance backing the RWX share.
  # REQUIRED only when filestoreShare is set.
  # [TF: filestore_ip]
  filestoreIp: ""

  # Size of the PersistentVolumeClaim bound to the Filestore share.
  # Must be <= the Filestore instance capacity set in Terraform.
  pvcSize: "1024Gi"

  # StorageClass reclaim policy: Retain keeps the underlying share on chart delete.
  reclaimPolicy: Retain

# ---------------------------------------------------------------------------
# GPU node pools — sourced from the `gpu_nodepool` Terraform module.
#
# With the parameterized gpu_skus design, every GPU pool shares:
#   taintKey    = nvidia.com/gpu   (NoSchedule, tolerated by Job pods)
#   skuLabelKey = reprolab/sku     (the primary Job nodeSelector key)
#
# Job pods target a specific pool via:
#   nodeSelector:
#     reprolab/sku: <defaultSku>    (or the plan's short_name at runtime)
#
# [TF: gpu_pools output]  Use gpu_pools[<short_name>].sku_label for each pool.
# ---------------------------------------------------------------------------
gpu:
  # Label key used to identify the target GPU pool in Job nodeSelectors.
  # Every GPU node pool is labeled reprolab/sku=<catalog short_name>.
  # [TF: gpu_sku_label_key]  constant: "reprolab/sku"
  skuLabelKey: reprolab/sku

  # Taint key applied to ALL GPU-pool nodes (value "present", effect NoSchedule).
  # Job pods tolerate this with operator: Exists.
  # [TF: gpu_taint_key]  constant: "nvidia.com/gpu"
  taintKey: nvidia.com/gpu

  # Default GPU SKU for smoke jobs and as the orchestrator fallback.
  # Must match a short_name in var.gpu_skus (i.e. a provisioned pool).
  # Changed from gcp_a100_80 (a2-ultragpu-1g, 1×A100-80GB) to gcp_a100_40x8
  # (a2-highgpu-8g, 8×A100-40GB) — sized for the 7B 8-GPU SDAR cell on one node.
  # Override in envs/<env>/helm-values.yaml when a different pool is primary.
  # [TF: gpu_pools — first entry's sku_label]
  defaultSku: gcp_a100_40x8

# ---------------------------------------------------------------------------
# RBAC — the Google identities bound to the Job-management Role.
# ---------------------------------------------------------------------------
rbac:
  # Google IAM members granted create/watch/delete on Jobs in the namespace.
  # Each entry is "user:<email>" or "group:<email>" — the prefix selects the
  # RoleBinding subject kind (User / Group).
  # [tfvar: operator_iam_members]  (envs/deepinvent/main.tfvars — not a TF output)
  operatorMembers: []   # e.g. ["user:alice@example.com", "group:team@example.com"]

# ---------------------------------------------------------------------------
# Artifact Registry / image — sourced from the `registry` Terraform module.
# ---------------------------------------------------------------------------
image:
  # Full Artifact Registry image ref for GKE cell Jobs.
  # [TF: artifact_registry_url] + "/gke-cell-base:<PINNED-tag>"
  # e.g. "us-central1-docker.pkg.dev/my-project/reprolab/gke-cell-base:0.1.0"
  gkeCellBase: ""   # REQUIRED — fill from `terraform output -raw artifact_registry_url`

# ---------------------------------------------------------------------------
# ResourceQuota limits for the namespace.
# Sizing rules (override in envs/<env>/helm-values.yaml as needed):
#   maxGpu / maxGpuLimits = Σ(pool max_nodes × gpu_count) across all GPU pools.
#     Default single A100-80 pool (max_nodes=4, gpu_count=1) → maxGpu=4.
#     Set to 8 here for headroom for a second pool; adjust to pool max_nodes.
#   maxJobs >= parallelism × (1 + max_escalations) + TTL-retained finished Jobs.
#     64 covers 2 concurrent 8-cell runs × 3 attempts + 1 hr TTL headroom.
# ---------------------------------------------------------------------------
resourceQuota:
  # Hard limit on the total number of nvidia.com/gpu REQUESTED across all pods.
  maxGpu: 8

  # Hard limit on nvidia.com/gpu LIMITS (typically == maxGpu for GPU workloads).
  maxGpuLimits: 8

  # Hard limit on the number of Jobs that may exist (running + pending) in namespace.
  maxJobs: 64

# ---------------------------------------------------------------------------
# Device plugin — GKE manages the NVIDIA device plugin via the node-pool driver
# install (gpu_driver_installation_config), so this chart ships NO DaemonSet.
# This block exists only for parity with the Azure mirror.  Leave disabled.
# ---------------------------------------------------------------------------
devicePlugin:
  # GKE installs and manages the device plugin automatically; do NOT enable.
  enabled: false

# ---------------------------------------------------------------------------
# Orchestrator — in-cluster ReproLab reasoning loop (Deployment + CronJob)
#
# DISABLED BY DEFAULT — existing installs are unchanged.  Enable with:
#   helm upgrade reprolab-gke ./infra/gcp/helm \
#     --set orchestrator.enabled=true \
#     --set orchestrator.deployment.enabled=true \
#     --set orchestrator.image=<region>-docker.pkg.dev/<project>/reprolab/reprolab-orchestrator:<sha> \
#     --set orchestrator.paper=2605.15155 \
#     --set orchestrator.gcpServiceAccount=$(terraform -chdir=infra/gcp output -raw orchestrator_gcp_service_account) \
#     --set orchestrator.gcpProject=<project-id> \
#     --set orchestrator.env.gcpProject=<project-id> \
#     --set orchestrator.env.gcpRegion=us-central1 \
#     --set orchestrator.env.gkeCluster=$(terraform -chdir=infra/gcp output -raw gke_cluster_name) \
#     --set orchestrator.env.artifactRegistry=$(terraform -chdir=infra/gcp output -raw artifact_registry_url) \
#     --set orchestrator.env.gcsBucket=$(terraform -chdir=infra/gcp output -raw gcs_bucket_name) \
#     --set orchestrator.env.nodePoolName=<gpu-pool-name> \
#     --set orchestrator.env.baseImage=<region>-docker.pkg.dev/<project>/reprolab/gke-cell-base:<sha>
#
# Prerequisites (before enabling):
#   1. Terraform applied with secret_manager_enabled = true (secrets created).
#   2. Secret values set out-of-band:
#        gcloud secrets versions add anthropic-api-key --data-file=<(echo -n "$KEY")
#        gcloud secrets versions add azure-openai-api-key --data-file=<(echo -n "$KEY")
#        # For claude-oauth headless root (Stream B):
#        gcloud secrets versions add claude-code-oauth-token --data-file=<(claude setup-token)
#   3. Secrets Store CSI driver + GCP provider installed cluster-wide (see
#      orchestrator-secretproviderclass.yaml header for the helm commands).
#   4. Orchestrator container image pushed to Artifact Registry with backend + the
#      claude CLI + Node installed (see ORCHESTRATOR IMAGE NOTE below).
#
# ORCHESTRATOR IMAGE NOTE:
#   The orchestrator pod runs `python -m backend.cli reproduce` which shells out
#   to the `claude` binary (claude-agent-sdk sub-agent calls) and Node (required
#   by the claude binary).  The image at orchestrator.image MUST include:
#     • Python + the reprolab backend (pip install -r backend/requirements.txt)
#     • Node >= 20.19 (the claude CLI runtime)
#     • The claude CLI binary (`npm install -g @anthropic-ai/claude-code@<version>`)
#   The gke-cell-base image does NOT include these (it is a GPU training image).
#   Operator step: build a dedicated orchestrator image from the repo root and
#   push it to Artifact Registry.  See docs/runbooks/running-the-project.md for
#   the Dockerfile template.  Do NOT use :latest.
#
# MODEL NOTE:
#   Default model is "claude-oauth" (unattended, $0/token) when
#   orchestrator.claudeOauthToken.enabled = true and the claude-code-oauth-token
#   secret is set.  Fall back to "azure" (AOAI root via AZURE_OPENAI_API_KEY)
#   for a non-OAuth deployment.
# ---------------------------------------------------------------------------
orchestrator:
  # Master gate — set to true to deploy the ServiceAccount, SecretProviderClass,
  # and whichever of Deployment / CronJob are individually enabled below.
  enabled: false

  # Container image for both the Deployment and CronJob.
  # Must be a PINNED Artifact Registry tag (never :latest) built from the repo root
  # and include the claude CLI + Node (see ORCHESTRATOR IMAGE NOTE above).
  # Example: us-central1-docker.pkg.dev/my-project/reprolab/reprolab-orchestrator:sha-abc1234
  image: ""

  # arXiv ID or local PDF path passed to `python -m backend.cli reproduce <paper>`.
  paper: ""

  # Root model for the reasoning loop.
  # "claude-oauth"  — uses CLAUDE_CODE_OAUTH_TOKEN from Secret Manager; fully
  #                   headless, $0/token (recommended; enable claudeOauthToken below).
  # "azure"         — uses AZURE_OPENAI_API_KEY from Secret Manager; headless.
  model: claude-oauth

  # ── Azure OpenAI endpoint/deployment (NON-SECRET; required for model=azure) ──
  # The `azure` root model also needs the (non-secret) resource coordinates —
  # backend/agents/rlm/models.py RAISES without AZURE_OPENAI_ENDPOINT and uses
  # AZURE_OPENAI_DEPLOYMENT when set.  Only AZURE_OPENAI_API_KEY comes from
  # Secret Manager; these come from plain .Values.  Default empty → no env var
  # in the default render.  Set when orchestrator.model=azure.
  azureOpenai:
    # Azure OpenAI resource URL, e.g. https://<resource>.openai.azure.com
    endpoint: ""
    # Azure OpenAI deployment name (the deployed model, e.g. gpt-4o).
    deployment: ""
    # Optional API version override (e.g. 2024-10-21); empty → the repo default
    # (DEFAULT_AZURE_OPENAI_API_VERSION) is used by the backend.
    apiVersion: ""

  # GCP project ID (or number) that owns the Secret Manager secrets.
  # Used by the SecretProviderClass to build secret resource names.
  # Obtain: gcloud config get-value project
  gcpProject: ""

  # GCP IAM service account email for the orchestrator KSA annotation.
  # Source: Terraform output orchestrator_gcp_service_account.
  # Annotated on the ServiceAccount as iam.gke.io/gcp-service-account.
  gcpServiceAccount: ""

  # Mount path inside the orchestrator pod where the CSI driver projects
  # the secret files.  The synced k8s Secret is what env vars reference;
  # this mount is required to keep that Secret live.
  csiMountPath: /mnt/sm-secrets

  # Per-run USD budget cap passed as `--max-usd` to `backend.cli reproduce`.
  # Bounds total spend (root LLM + GPU) for a single orchestrator run.
  maxUsd: 400

  # OPENRESEARCH_RESUME_CELLS — "1" resumes already-completed training cells from
  # the GCS artifact bus instead of re-running them (cheaper restarts).
  resumeCells: "1"

  # OPENRESEARCH_STABLE_RUN_ID — "1" derives a deterministic run id so a restarted
  # orchestrator pod rejoins the same run/artifacts rather than forking a new one.
  stableRunId: "1"

  # OPENRESEARCH_GCP_USE_SPOT — set to "1" to request spot GPU nodes for training
  # cells (cheaper, preemptible).  Empty ("") keeps the on-demand default.
  useSpot: ""

  # ── Long-lived Claude OAuth token (Stream B, opt-in) ────────────────────────
  # CRITICAL INVARIANT: this block is DEFAULT FALSE so that the DEFAULT
  # `helm template infra/gcp/helm` render is byte-identical before and after
  # this commit.  The env var CLAUDE_CODE_OAUTH_TOKEN and its secret mount
  # appear ONLY when an operator sets orchestrator.claudeOauthToken.enabled=true.
  claudeOauthToken:
    # Set to true to inject CLAUDE_CODE_OAUTH_TOKEN from the Secret Manager
    # secret 'claude-code-oauth-token' as a container env var.
    # Requires: the secret exists in Secret Manager AND has a version set:
    #   claude setup-token | gcloud secrets versions add claude-code-oauth-token --data-file=-
    # and orchestrator.model=claude-oauth.
    enabled: false

  # ── Deployment (always-on / interactive run) ─────────────────────────────────
  deployment:
    # Set to true to deploy the long-running Deployment.  Requires orchestrator.enabled=true.
    enabled: false

  # ── CronJob (scheduled / nightly batch) ──────────────────────────────────────
  cronjob:
    # Set to true to deploy the CronJob.  Requires orchestrator.enabled=true.
    enabled: false
    # Cron schedule in UTC.  Default: 02:00 UTC daily.
    schedule: "0 2 * * *"

  # ── OPENRESEARCH_GCP_* environment variables ──────────────────────────────────
  # All default to empty; the orchestrator will fail fast with a clear message
  # if a required value is missing (see config.py / gke_job_backend.py).
  # Fill from Terraform outputs after `terraform apply`.
  env:
    # GCP project ID.
    # Source: var.project_id (same as the Terraform root variable).
    gcpProject: ""

    # GCP region (e.g. us-central1).
    # Source: var.region
    gcpRegion: ""

    # GKE cluster name.
    # Source: terraform output -raw gke_cluster_name
    gkeCluster: ""

    # Artifact Registry base URL (REGION-docker.pkg.dev/PROJECT/REPO).
    # Source: terraform output -raw artifact_registry_url
    artifactRegistry: ""

    # GCS bucket name for run artifacts.
    # Source: terraform output -raw gcs_bucket_name
    gcsBucket: ""

    # Kubernetes namespace where training-cell Jobs are submitted.
    # Must match .Values.namespace (default reprolab).
    namespace: ""

    # Kubernetes ServiceAccount name for training-cell Jobs (NOT the orchestrator SA).
    # Must match .Values.serviceAccountName (default reprolab-sa).
    serviceAccount: ""

    # GPU node pool name used for nodeSelector on training-cell Jobs.
    # Formula: <prefix><poolSuffix> from gpu_skus.
    nodePoolName: ""

    # Pre-baked Artifact Registry base image for training-cell Jobs.
    # Must be a PINNED tag — never :latest.
    # Example: us-central1-docker.pkg.dev/my-project/reprolab/gke-cell-base:sha-abc1234
    baseImage: ""
