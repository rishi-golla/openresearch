{{- if and .Values.orchestrator.enabled .Values.orchestrator.cronjob.enabled }}
{{- if not .Values.orchestrator.image }}{{ fail "orchestrator.image must be set to a pinned Artifact Registry tag when orchestrator.enabled=true (see docker/orchestrator/Dockerfile + scripts/build_orchestrator_image.sh)" }}{{- end }}
# ---------------------------------------------------------------------------
# orchestrator-cronjob.yaml
#
# Runs the ReproLab reasoning loop on a schedule (e.g. nightly batch).
# Each invocation is a single Job execution; the CronJob controller manages
# scheduling and prevents concurrency (concurrencyPolicy: Forbid).
#
# DEFAULT MODEL: claude-oauth (same headless rationale as the Deployment — see
# orchestrator-deployment.yaml header comment).
#
# Schedule: .Values.orchestrator.cronjob.schedule (default "0 2 * * *" = 02:00 UTC)
# Concurrency: Forbid — do not queue a new Job if the previous one is still running.
#
# NODE PLACEMENT: system pool (CPU only) — same as Deployment.
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: CronJob
metadata:
  name: reprolab-orchestrator-cron
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator-cron
spec:
  schedule: {{ .Values.orchestrator.cronjob.schedule | default "0 2 * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            {{- include "reprolab-gke.labels" . | nindent 12 }}
            app.kubernetes.io/component: orchestrator-cron
        spec:
          serviceAccountName: reprolab-orchestrator
          restartPolicy: Never

          # CPU system pool — same placement constraint as the Deployment.
          nodeSelector:
            reprolab/node-type: system

          containers:
            - name: orchestrator
              image: {{ .Values.orchestrator.image | quote }}
              imagePullPolicy: IfNotPresent

              command:
                - python
                - -m
                - backend.cli
                - reproduce
                - {{ .Values.orchestrator.paper | quote }}
                - --mode
                - rlm
                - --model
                # Default: claude-oauth (unattended, $0/token via CLAUDE_CODE_OAUTH_TOKEN).
                - {{ .Values.orchestrator.model | quote }}
                - --sandbox
                - gcp
                - --max-usd
                - {{ .Values.orchestrator.maxUsd | default 400 | quote }}

              env:
                # ── API keys (from synced Secret Manager secret) ────────────
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: reprolab-orchestrator-secrets
                      key: ANTHROPIC_API_KEY
                - name: AZURE_OPENAI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: reprolab-orchestrator-secrets
                      key: AZURE_OPENAI_API_KEY

                # ── Azure OpenAI endpoint/deployment (NON-SECRET config) ─────
                # Required by the `azure` root model (backend/agents/rlm/models.py
                # raises without AZURE_OPENAI_ENDPOINT/AZURE_OPENAI_DEPLOYMENT).
                # Non-secret resource coordinates → .Values, NOT the
                # SecretProviderClass.  Gated on value set, so the DEFAULT render
                # (all empty) is byte-identical.
                {{- if .Values.orchestrator.azureOpenai.endpoint }}
                - name: AZURE_OPENAI_ENDPOINT
                  value: {{ .Values.orchestrator.azureOpenai.endpoint | quote }}
                {{- end }}
                {{- if .Values.orchestrator.azureOpenai.deployment }}
                - name: AZURE_OPENAI_DEPLOYMENT
                  value: {{ .Values.orchestrator.azureOpenai.deployment | quote }}
                {{- end }}
                {{- if .Values.orchestrator.azureOpenai.apiVersion }}
                - name: AZURE_OPENAI_API_VERSION
                  value: {{ .Values.orchestrator.azureOpenai.apiVersion | quote }}
                {{- end }}

                # ── Long-lived Claude OAuth token (opt-in, Stream B) ─────────
                # CRITICAL: gated on .Values.orchestrator.claudeOauthToken.enabled
                # (default false) so the DEFAULT render is byte-identical to HEAD.
                {{- if .Values.orchestrator.claudeOauthToken.enabled }}
                - name: CLAUDE_CODE_OAUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: reprolab-orchestrator-secrets
                      key: CLAUDE_CODE_OAUTH_TOKEN
                # Auth-hijack guard: the pod injects ANTHROPIC_API_KEY
                # unconditionally, and the default "auto" strategy prefers an API
                # key over OAuth — so a present-but-DEAD ANTHROPIC_API_KEY 400s
                # the run instead of falling back to OAuth.  When the OAuth token
                # is enabled, force the OAuth surface (backend/config.py
                # llm_auth_strategy, enforced in backend/agents/runtime/factory.py).
                - name: OPENRESEARCH_LLM_AUTH_STRATEGY
                  value: "oauth_only"
                {{- end }}

                # ── GCP backend config (OPENRESEARCH_GCP_* block) ────────────
                - name: OPENRESEARCH_GCP_PROJECT
                  value: {{ .Values.orchestrator.env.gcpProject | default "" | quote }}
                - name: OPENRESEARCH_GCP_REGION
                  value: {{ .Values.orchestrator.env.gcpRegion | default "" | quote }}
                - name: OPENRESEARCH_GCP_GKE_CLUSTER
                  value: {{ .Values.orchestrator.env.gkeCluster | default "" | quote }}
                - name: OPENRESEARCH_GCP_ARTIFACT_REGISTRY
                  value: {{ .Values.orchestrator.env.artifactRegistry | default "" | quote }}
                - name: OPENRESEARCH_GCP_GCS_BUCKET
                  value: {{ .Values.orchestrator.env.gcsBucket | default "" | quote }}
                - name: OPENRESEARCH_GCP_NAMESPACE
                  value: {{ .Values.orchestrator.env.namespace | default "reprolab" | quote }}
                - name: OPENRESEARCH_GCP_SERVICE_ACCOUNT
                  value: {{ .Values.orchestrator.env.serviceAccount | default "reprolab-sa" | quote }}
                - name: OPENRESEARCH_GCP_NODE_POOL_NAME
                  value: {{ .Values.orchestrator.env.nodePoolName | default "" | quote }}
                - name: OPENRESEARCH_GCP_BASE_IMAGE
                  value: {{ .Values.orchestrator.env.baseImage | default "" | quote }}

                # ── Run reliability knobs (resume / stable id / spot) ────────
                - name: OPENRESEARCH_RESUME_CELLS
                  value: {{ .Values.orchestrator.resumeCells | default "1" | quote }}
                - name: OPENRESEARCH_STABLE_RUN_ID
                  value: {{ .Values.orchestrator.stableRunId | default "1" | quote }}
                - name: OPENRESEARCH_GCP_USE_SPOT
                  value: {{ .Values.orchestrator.useSpot | default "" | quote }}

              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"

              volumeMounts:
                # CSI volume mount MUST be present to keep the synced k8s Secret live.
                - name: sm-secrets
                  mountPath: {{ .Values.orchestrator.csiMountPath | default "/mnt/sm-secrets" | quote }}
                  readOnly: true

          volumes:
            - name: sm-secrets
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: reprolab-orchestrator-sm
{{- end }}
