apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
  annotations:
    # ---------------------------------------------------------------------------
    # WORKLOAD IDENTITY (GKE) — binds this Kubernetes ServiceAccount to the GCP
    # IAM service account created by the Terraform `identity` module.  GKE's
    # metadata server uses this annotation to mint GSA tokens for pods that run
    # as this KSA.  The value MUST equal the `gsa_email` output of that module,
    # and the module's iam.workloadIdentityUser binding MUST reference exactly
    # `<project>.svc.id.goog[<namespace>/<serviceAccountName>]`.
    #
    # NOTE: unlike Azure, GKE needs NO per-pod label (there is no
    # `azure.workload.identity/use`) — the KSA annotation alone wires it up.
    # ---------------------------------------------------------------------------
    iam.gke.io/gcp-service-account: {{ .Values.workloadIdentity.gcpServiceAccount | quote }}
