{{- if and .Values.orchestrator.enabled .Values.orchestrator.deployment.enabled }}
{{- if not .Values.orchestrator.image }}{{ fail "orchestrator.image must be set to a pinned Artifact Registry tag when orchestrator.enabled=true (see docker/orchestrator/Dockerfile + scripts/build_orchestrator_image.sh)" }}{{- end }}
# ---------------------------------------------------------------------------
# orchestrator-deployment.yaml
#
# Runs the ReproLab reasoning loop (RLM root + primitives) continuously inside
# GKE on a CPU system-pool node — no GPU requested here.  Training cells are
# dispatched outward as K8s Jobs via k8s_job_cell_runner (--sandbox gcp).
#
# DEFAULT MODEL: claude-oauth (root via CLAUDE_CODE_OAUTH_TOKEN from Secret
# Manager, $0/token, the recommended unattended model).  For azure-hosted roots
# set orchestrator.model=azure (requires azure-openai-api-key secret).
#
# API key secrets are injected via the Secrets Store CSI volume (see
# orchestrator-secretproviderclass.yaml).  The CSI volumeMount MUST be present
# to keep the synced k8s Secret live; remove it and the Secret expires.
#
# NODE PLACEMENT: system pool (CPU only).
#   nodeSelector: reprolab/node-type: system
# No GPU taint toleration — confirms the orchestrator never lands on a GPU node.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reprolab-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "reprolab-gke.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: orchestrator
  template:
    metadata:
      labels:
        {{- include "reprolab-gke.labels" . | nindent 8 }}
        app.kubernetes.io/component: orchestrator
    spec:
      serviceAccountName: reprolab-orchestrator

      # CPU system pool — orchestrator must NOT land on a (scarce, expensive) GPU node.
      # GKE system pool nodes are labeled reprolab/node-type=system by the Terraform
      # gke module.  GPU nodes carry a NoSchedule taint (nvidia.com/gpu=present) that
      # the orchestrator has no toleration for, providing a second line of defence.
      nodeSelector:
        reprolab/node-type: system

      containers:
        - name: orchestrator
          image: {{ .Values.orchestrator.image | quote }}
          imagePullPolicy: IfNotPresent

          command:
            - python
            - -m
            - backend.cli
            - reproduce
            - {{ .Values.orchestrator.paper | quote }}
            - --mode
            - rlm
            - --model
            # Default: claude-oauth (unattended, $0/token via CLAUDE_CODE_OAUTH_TOKEN).
            # For smoke tests or AOAI root: override with --set orchestrator.model=azure
            - {{ .Values.orchestrator.model | quote }}
            - --sandbox
            - gcp
            - --max-usd
            - {{ .Values.orchestrator.maxUsd | default 400 | quote }}

          env:
            # ── API keys (from synced Secret Manager secret) ──────────────────
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reprolab-orchestrator-secrets
                  key: ANTHROPIC_API_KEY
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reprolab-orchestrator-secrets
                  key: AZURE_OPENAI_API_KEY

            {{- /*
              OAuth-free providers: Azure AI Foundry (grok) + OpenAI.  Every
              block below is gated on its values toggle (default false/empty)
              and the comments live INSIDE the gate, so the DEFAULT render is
              byte-identical to HEAD.  The secretKeyRef pairs with the
              SecretProviderClass gate (it would fail if the key is absent from
              the synced Secret).
            */}}
            {{- if .Values.orchestrator.azureFoundry.apiKey.enabled }}
            # AZURE_FOUNDRY_API_KEY — grok root/sub-agent auth (from the synced
            # Secret Manager secret 'azure-foundry-api-key').
            - name: AZURE_FOUNDRY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reprolab-orchestrator-secrets
                  key: AZURE_FOUNDRY_API_KEY
            {{- end }}
            {{- if .Values.orchestrator.openaiApiKey.enabled }}
            # OPENAI_API_KEY — OpenAI sub-agent auth (from the synced Secret
            # Manager secret 'openai-api-key').
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: reprolab-orchestrator-secrets
                  key: OPENAI_API_KEY
            {{- end }}
            {{- if .Values.orchestrator.azureFoundry.endpoint }}
            # AZURE_FOUNDRY_ENDPOINT/_DEPLOYMENT — NON-SECRET resource coords for
            # the `azure-foundry` (grok) root/sub-role models (backend/config.py).
            - name: AZURE_FOUNDRY_ENDPOINT
              value: {{ .Values.orchestrator.azureFoundry.endpoint | quote }}
            {{- end }}
            {{- if .Values.orchestrator.azureFoundry.deployment }}
            - name: AZURE_FOUNDRY_DEPLOYMENT
              value: {{ .Values.orchestrator.azureFoundry.deployment | quote }}
            {{- end }}

            # ── Azure OpenAI endpoint/deployment (NON-SECRET config) ───────────
            # Required by the `azure` root model (backend/agents/rlm/models.py
            # raises without AZURE_OPENAI_ENDPOINT/AZURE_OPENAI_DEPLOYMENT).
            # These are non-secret resource coordinates, so they come from
            # .Values (NOT the SecretProviderClass).  Each is gated on its value
            # being set, so the DEFAULT render (all empty) is byte-identical.
            {{- if .Values.orchestrator.azureOpenai.endpoint }}
            - name: AZURE_OPENAI_ENDPOINT
              value: {{ .Values.orchestrator.azureOpenai.endpoint | quote }}
            {{- end }}
            {{- if .Values.orchestrator.azureOpenai.deployment }}
            - name: AZURE_OPENAI_DEPLOYMENT
              value: {{ .Values.orchestrator.azureOpenai.deployment | quote }}
            {{- end }}
            {{- if .Values.orchestrator.azureOpenai.apiVersion }}
            - name: AZURE_OPENAI_API_VERSION
              value: {{ .Values.orchestrator.azureOpenai.apiVersion | quote }}
            {{- end }}

            {{- /*
              Per-role model selection + auth strategy (OAuth-free runs).  Lets
              an operator run fully OAuth-free, e.g. model=azure-foundry +
              roleModels="executor=grok,grader=grok" + authStrategy=api_only.
              Both NON-SECRET; gated on a non-empty value so the DEFAULT render
              (both empty) is byte-identical.
            */}}
            {{- if .Values.orchestrator.roleModels }}
            - name: OPENRESEARCH_ROLE_MODELS
              value: {{ .Values.orchestrator.roleModels | quote }}
            {{- end }}
            {{- if .Values.orchestrator.authStrategy }}
            - name: OPENRESEARCH_LLM_AUTH_STRATEGY
              value: {{ .Values.orchestrator.authStrategy | quote }}
            {{- end }}

            # ── Long-lived Claude OAuth token (opt-in, Stream B) ───────────────
            # CRITICAL: gated on .Values.orchestrator.claudeOauthToken.enabled
            # (default false) so the DEFAULT render is byte-identical to HEAD.
            # The token is only present in the SecretProviderClass + synced Secret
            # when this flag is on; the secretKeyRef below would fail if the key
            # is absent from the Secret, so the entire block is conditional.
            {{- if .Values.orchestrator.claudeOauthToken.enabled }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reprolab-orchestrator-secrets
                  key: CLAUDE_CODE_OAUTH_TOKEN
            # Auth-hijack guard: the pod injects ANTHROPIC_API_KEY unconditionally,
            # and the default "auto" strategy prefers an API key over OAuth — so a
            # present-but-DEAD ANTHROPIC_API_KEY 400s the run instead of falling
            # back to OAuth.  When the OAuth token is enabled, force the OAuth
            # surface (backend/config.py llm_auth_strategy, enforced in
            # backend/agents/runtime/factory.py).
            - name: OPENRESEARCH_LLM_AUTH_STRATEGY
              value: "oauth_only"
            {{- end }}

            # ── GCP backend config (OPENRESEARCH_GCP_* block) ──────────────────
            # Values sourced from .Values.orchestrator.env; all default to empty
            # so the chart installs cleanly even before the operator fills them.
            - name: OPENRESEARCH_GCP_PROJECT
              value: {{ .Values.orchestrator.env.gcpProject | default "" | quote }}
            - name: OPENRESEARCH_GCP_REGION
              value: {{ .Values.orchestrator.env.gcpRegion | default "" | quote }}
            - name: OPENRESEARCH_GCP_GKE_CLUSTER
              value: {{ .Values.orchestrator.env.gkeCluster | default "" | quote }}
            - name: OPENRESEARCH_GCP_ARTIFACT_REGISTRY
              value: {{ .Values.orchestrator.env.artifactRegistry | default "" | quote }}
            - name: OPENRESEARCH_GCP_GCS_BUCKET
              value: {{ .Values.orchestrator.env.gcsBucket | default "" | quote }}
            - name: OPENRESEARCH_GCP_NAMESPACE
              value: {{ .Values.orchestrator.env.namespace | default "reprolab" | quote }}
            - name: OPENRESEARCH_GCP_SERVICE_ACCOUNT
              value: {{ .Values.orchestrator.env.serviceAccount | default "reprolab-sa" | quote }}
            - name: OPENRESEARCH_GCP_NODE_POOL_NAME
              value: {{ .Values.orchestrator.env.nodePoolName | default "" | quote }}
            - name: OPENRESEARCH_GCP_BASE_IMAGE
              value: {{ .Values.orchestrator.env.baseImage | default "" | quote }}

            # ── Run reliability knobs (resume / stable id / spot) ──────────────
            - name: OPENRESEARCH_RESUME_CELLS
              value: {{ .Values.orchestrator.resumeCells | default "1" | quote }}
            - name: OPENRESEARCH_STABLE_RUN_ID
              value: {{ .Values.orchestrator.stableRunId | default "1" | quote }}
            - name: OPENRESEARCH_GCP_USE_SPOT
              value: {{ .Values.orchestrator.useSpot | default "" | quote }}

          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

          volumeMounts:
            # CSI volume mount MUST be present for the synced k8s Secret to stay live.
            - name: sm-secrets
              mountPath: {{ .Values.orchestrator.csiMountPath | default "/mnt/sm-secrets" | quote }}
              readOnly: true

      volumes:
        - name: sm-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: reprolab-orchestrator-sm
{{- end }}
