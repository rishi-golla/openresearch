{{- if .Values.orchestrator.enabled }}
# ---------------------------------------------------------------------------
# orchestrator-secretproviderclass.yaml
#
# Secrets Store CSI Driver SecretProviderClass — mounts the API keys from
# GCP Secret Manager into the orchestrator Pod and syncs them as a k8s Secret
# so they can be injected as environment variables without any static secret.
#
# Prerequisites (cluster-level, not managed by this chart):
#   • secrets-store-csi-driver DaemonSet installed:
#       helm install csi-secrets-store secrets-store-csi-driver/secrets-store-csi-driver \
#         -n kube-system --set syncSecret.enabled=true
#   • GCP Secrets Store CSI provider installed:
#       helm install secrets-store-csi-driver-provider-gcp \
#         secrets-store-csi-driver-provider-gcp/secrets-store-csi-driver-provider-gcp \
#         -n kube-system
#
# Secrets surfaced (mounted from Secret Manager at pod start; synced to k8s Secret):
#   anthropic-api-key       →  env ANTHROPIC_API_KEY       (Sonnet sub-agent auth)
#   azure-openai-api-key    →  env AZURE_OPENAI_API_KEY    (AOAI root model auth)
#   claude-code-oauth-token →  env CLAUDE_CODE_OAUTH_TOKEN (headless OAuth; opt-in)
#
# Auth: the orchestrator ServiceAccount's Workload Identity annotation
# (iam.gke.io/gcp-service-account) is what the GCP CSI provider uses to mint
# a GSA token — no static JSON key, no Kubernetes Secret containing credentials.
#
# resourceName format for GCP provider:
#   projects/<project>/secrets/<secret-name>/versions/latest
#
# Set .Values.orchestrator.gcpProject to the project ID, OR to the project
#   number from `gcloud projects describe <project-id> --format='value(projectNumber)'`
#   — the GCP provider accepts both project ID and project number.
# ---------------------------------------------------------------------------
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: reprolab-orchestrator-sm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/{{ required "orchestrator.gcpProject must be set to the GCP project ID (or number) that owns the secrets" .Values.orchestrator.gcpProject }}/secrets/anthropic-api-key/versions/latest"
        path: "anthropic-api-key"
      - resourceName: "projects/{{ .Values.orchestrator.gcpProject }}/secrets/azure-openai-api-key/versions/latest"
        path: "azure-openai-api-key"
      {{- if .Values.orchestrator.claudeOauthToken.enabled }}
      - resourceName: "projects/{{ .Values.orchestrator.gcpProject }}/secrets/claude-code-oauth-token/versions/latest"
        path: "claude-code-oauth-token"
      {{- end }}
  # Sync pulled secrets into a Kubernetes Secret so they can be referenced as
  # env vars without a volumeMount in every container (both the volumeMount and
  # the secretObjects sync are used — the mount is required to keep the Secret
  # live; the env reference reads from the synced Secret).
  secretObjects:
    - secretName: reprolab-orchestrator-secrets
      type: Opaque
      data:
        - objectName: anthropic-api-key
          key: ANTHROPIC_API_KEY
        - objectName: azure-openai-api-key
          key: AZURE_OPENAI_API_KEY
        {{- if .Values.orchestrator.claudeOauthToken.enabled }}
        - objectName: claude-code-oauth-token
          key: CLAUDE_CODE_OAUTH_TOKEN
        {{- end }}
{{- end }}
