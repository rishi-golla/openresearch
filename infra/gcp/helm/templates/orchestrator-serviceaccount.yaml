{{- if .Values.orchestrator.enabled }}
# ---------------------------------------------------------------------------
# orchestrator-serviceaccount.yaml
#
# Kubernetes ServiceAccount for the in-cluster ReproLab orchestrator
# (Deployment + CronJob).  This is a SEPARATE identity from the training-cell
# ServiceAccount (reprolab-sa) so Secret Manager access is auditable independently.
#
# WORKLOAD IDENTITY wiring (GKE):
#   1. The Terraform identity module creates a GCP service account named
#      "<prefix>-orchestrator" and grants it:
#        • roles/secretmanager.secretAccessor on the three API-key secrets
#        • roles/storage.objectAdmin on the artifact bucket
#      and creates a Workload Identity binding for:
#        serviceAccount:<project>.svc.id.goog[<namespace>/reprolab-orchestrator]
#   2. This ServiceAccount carries the annotation pointing at that GSA's email.
#   3. Pods that use this SA automatically receive short-lived GSA access tokens
#      from GKE's metadata server — no static JSON key, no static secret.
#
# NOTE: unlike Azure, GKE needs NO per-pod label (there is no
# `azure.workload.identity/use`) — the KSA annotation alone wires it up.
#
# Fill .Values.orchestrator.gcpServiceAccount from Terraform output
# `orchestrator_gcp_service_account`:
#   --set orchestrator.gcpServiceAccount=$(terraform -chdir=infra/gcp output -raw orchestrator_gcp_service_account)
# ---------------------------------------------------------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reprolab-orchestrator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
  annotations:
    # WORKLOAD IDENTITY — must match the email of the orchestrator GSA.
    # Source: Terraform output orchestrator_gcp_service_account.
    iam.gke.io/gcp-service-account: {{ required "orchestrator.gcpServiceAccount must be set to the identity module's orchestrator_gsa_email output" .Values.orchestrator.gcpServiceAccount | quote }}
{{- end }}
