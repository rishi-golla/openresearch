{{- if .Values.devicePlugin.enabled }}
# ---------------------------------------------------------------------------
# NVIDIA device-plugin DaemonSet — DISABLED BY DEFAULT ON GKE.
#
# GKE installs AND manages the NVIDIA device plugin automatically via the
# node-pool `gpu_driver_installation_config` (gpu_driver_version = "DEFAULT" in
# the gpu_nodepool Terraform module).  Shipping a second device plugin here
# would conflict with GKE's managed one.
#
# This template exists ONLY for parity with the Azure mirror and is gated behind
# devicePlugin.enabled (default false).  Do NOT enable on a standard GKE
# cluster.  It would only be relevant on a hypothetical cluster where GKE's
# managed driver install was disabled — an unsupported posture for this backend.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reprolab-gke.labels" . | nindent 4 }}
    app: nvidia-device-plugin
spec:
  selector:
    matchLabels:
      app: nvidia-device-plugin
      {{- include "reprolab-gke.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: nvidia-device-plugin
        {{- include "reprolab-gke.selectorLabels" . | nindent 8 }}
    spec:
      nodeSelector:
        reprolab/node-type: "gpu"
      tolerations:
        - key: {{ .Values.gpu.taintKey | quote }}
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoExecute
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoExecute
      priorityClassName: system-node-critical
      containers:
        - name: nvidia-device-plugin
          image: "nvcr.io/nvidia/k8s-device-plugin:v0.16.2"
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
{{- end }}
