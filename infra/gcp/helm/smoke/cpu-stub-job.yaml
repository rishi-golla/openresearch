# ---------------------------------------------------------------------------
# cpu-stub-job.yaml — CPU-only validation fallback (quota-blocked path, GKE)
#
# PURPOSE:
#   Validate the GCS bus, Filestore PVC mount, Workload Identity, and Job watch
#   plumbing WITHOUT consuming any nvidia.com/gpu quota.  Use this when the
#   A100 quota request is still pending or for fast CI-style feedback.
#
# WHAT IT PROVES:
#   1. Workload Identity works (KSA → GSA impersonation, no key).
#   2. Application Default Credentials can write a marker object to GCS.
#   3. The Filestore PVC mounts at /mnt/reprolab-cache with read-write access
#      (only when Filestore is enabled).
#   4. The orchestrator's k8s job cell runner job-watch loop can detect Job
#      success and pull artifacts from GCS.
#   5. ResourceQuota allows the Job (GPU quota not consumed).
#
# WHAT IT DOES NOT PROVE:
#   - GPU scheduling (use hello-gpu-job.yaml once quota is granted).
#   - CUDA execution or nvidia-smi availability.
#
# USAGE:
#   kubectl apply -f smoke/cpu-stub-job.yaml -n <namespace>
#   kubectl get jobs -n <namespace> -w
#   kubectl logs -n <namespace> job/cpu-stub-smoke -f
#
# SUCCESS CRITERIA:
#   Job status = Completed; logs contain "GCS write OK" and "Filestore PVC OK".
#   A marker object appears under smoke/ in your GCS bucket.
#
# FILL BEFORE RUNNING — substitute from `terraform output`:
#   GCS_BUCKET      = terraform output -raw gcs_bucket_name
#   IMAGE           = any image with google-cloud-storage installed (the
#                     gke-cell-base image works; or python:3.12-slim +
#                     pip install google-cloud-storage)
#   NAMESPACE       = the value of .Values.namespace
#   SERVICE_ACCOUNT = the value of .Values.serviceAccountName
# ---------------------------------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: cpu-stub-smoke
  # Replace with your namespace (.Values.namespace)
  namespace: reprolab
  labels:
    app.kubernetes.io/name: reprolab-gke-smoke
    app.kubernetes.io/component: cpu-stub
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: cpu-stub-smoke
    spec:
      # Workload-Identity-annotated SA. On GKE the KSA annotation alone wires up
      # Workload Identity (no per-pod label, unlike Azure).
      # Value MUST match .Values.serviceAccountName (default: reprolab-sa).
      serviceAccountName: reprolab-sa
      restartPolicy: Never

      # NO nodeSelector — runs on the system (CPU) node pool.
      # NO GPU taint toleration — confirms CPU node scheduling works.

      containers:
        - name: cpu-stub
          # Can use the gke-cell-base image (which has google-cloud-storage),
          # or any Python image after pip-installing google-cloud-storage.
          image: "REPLACE_WITH_IMAGE"
          imagePullPolicy: IfNotPresent

          # CPU-only — no nvidia.com/gpu resource.
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          env:
            - name: REPROLAB_GCS_BUCKET
              # [TF: gcs_bucket_name]
              value: "REPLACE_WITH_GCS_BUCKET"
            - name: SMOKE_OBJECT_NAME
              value: "smoke/cpu-stub-smoke-marker.txt"

          volumeMounts:
            - name: reprolab-cache
              mountPath: /mnt/reprolab-cache

          command:
            - /bin/bash
            - -euo
            - pipefail
            - -c
            - |
              echo "=== cpu-stub-smoke starting ==="

              # 1. Write and read a test file on the Filestore PVC.
              echo "--- Filestore PVC write ---"
              TMPFILE="/mnt/reprolab-cache/cpu-stub-test-$(date +%s).txt"
              echo "cpu-stub hello at $(date)" > "${TMPFILE}"
              cat "${TMPFILE}"
              rm "${TMPFILE}"
              echo "Filestore PVC OK"

              # 2. Write a marker object using Workload Identity.
              echo "--- GCS write via Workload Identity ---"
              python3 - <<'PYEOF'
              import os, sys, datetime
              bucket = os.environ["REPROLAB_GCS_BUCKET"]
              obj = os.environ["SMOKE_OBJECT_NAME"]
              try:
                  from google.cloud import storage
              except ImportError:
                  # Fallback: install on the fly if using a minimal image.
                  import subprocess
                  subprocess.check_call([
                      sys.executable, "-m", "pip", "install", "-q",
                      "google-cloud-storage>=2.16,<3",
                  ])
                  from google.cloud import storage
              client = storage.Client()
              marker = f"cpu-stub-smoke OK at {datetime.datetime.utcnow().isoformat()}"
              client.bucket(bucket).blob(obj).upload_from_string(marker.encode())
              print(f"Uploaded marker: gs://{bucket}/{obj}")
              print("GCS write OK")
              PYEOF

              echo "=== cpu-stub-smoke PASSED ==="

      volumes:
        - name: reprolab-cache
          persistentVolumeClaim:
            claimName: reprolab-cache
