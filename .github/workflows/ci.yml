name: ci

# PR gate for actual code: until 2026-06-09 the ONLY workflow was
# docs-freshness, so any PR could break the 3,600-test backend or the
# frontend build and merge green. Both suites are hermetic in CI: no API
# keys, no Docker daemon, no .env (verified locally with keys stripped —
# 3609 passed / 0 failed in ~34s on 10 cores; expect ~2-4 min here).

on:
  pull_request:
  push:
    branches: [main, bes]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Matches the Dockerfile's python:3.12-slim runtime (dev venvs run
          # 3.14; pyproject floor is 3.11 — CI pins the deploy interpreter).
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Smoke (app factory + CLI parse)
        run: |
          python -c "from backend.app import create_app; create_app(); print('factory OK')"
          python -m backend.cli --help > /dev/null && echo "CLI OK"
      - name: Tests
        env:
          # Belt-and-braces: tests/conftest.py pins this too. Runners with
          # small disks must never re-trip the run_experiment disk floor.
          OPENRESEARCH_DISK_FLOOR_GB: "0"
        # faulthandler_timeout: any future stalled test dumps thread stacks
        # to the log instead of hanging the job to its timeout.
        run: python -m pytest tests/ -q -n auto -o faulthandler_timeout=300

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test
      # Build needs no backend: OPENRESEARCH_BACKEND_URL is read at runtime
      # only (verified: build passes with the var unset).
      - run: npm run build

  e2e:
    # Full-stack Playwright suite against a SEEDED keyless backend — the job
    # that would have caught the broken-node-selection pointer-capture bug
    # (audit 2026-06-10). Specs are fixture/seed-driven; no LLM credentials,
    # no network beyond localhost.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Seed e2e fixtures
        run: python scripts/seed_fake_run.py
      - name: Start backend (keyless)
        run: |
          nohup python -m uvicorn backend.app:create_app --factory --port 8000 \
            > /tmp/uvicorn-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 2
          done
          curl -fsS http://127.0.0.1:8000/health
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --no-audit --no-fund
      - name: Install chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Playwright
        working-directory: frontend
        # webServer in playwright.config.ts builds and serves :3001 itself,
        # proxying /api/demo/* to the seeded backend on :8000.
        run: npx playwright test
      - name: Backend log on failure
        if: failure()
        run: tail -50 /tmp/uvicorn-e2e.log
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          # Pin uv so the lock-check and ruff invocation are reproducible.
          version: "0.11.16"
      - name: Lock check
        # Fails if uv.lock is out of sync with pyproject.toml.
        run: uv lock --check
      - name: Lint
        # Pin ruff to match the version used when the config was authored.
        run: uvx ruff@0.15.16 check .

  compose-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config -q
